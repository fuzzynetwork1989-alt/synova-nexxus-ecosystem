name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Validate synova.app.json
      run: npm run validate:manifest
    
    - name: Validate Supanova integration
      run: |
        echo "Checking required Supanova files..."
        test -f supanova/manifest.json || (echo "Missing supanova/manifest.json" && exit 1)
        test -f supanova/tools/index.ts || (echo "Missing supanova/tools/index.ts" && exit 1)
        test -f supanova/context/emitter.ts || (echo "Missing supanova/context/emitter.ts" && exit 1)
        test -f supanova/context/schema.json || (echo "Missing supanova/context/schema.json" && exit 1)
        test -f supanova/policies/permissions.json || (echo "Missing supanova/policies/permissions.json" && exit 1)
        test -f supanova/policies/guardrails.md || (echo "Missing supanova/policies/guardrails.md" && exit 1)
        test -f SUPANOVA_INTEGRATION.md || (echo "Missing SUPANOVA_INTEGRATION.md" && exit 1)
        echo "✅ All required Supanova files present"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Type check
      run: npm run type-check

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm run test:coverage
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info

  build:
    runs-on: ubuntu-latest
    needs: [validate-manifests, lint, test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-files
        path: .next/
