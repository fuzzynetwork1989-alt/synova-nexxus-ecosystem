name: Validate Manifests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Validate synova.app.json
      run: node scripts/validate-manifest.js
    
    - name: Validate Supanova manifest
      run: |
        echo "Validating supanova/manifest.json..."
        npx ajv validate -s scripts/schemas/supanova-manifest.json -d supanova/manifest.json
    
    - name: Validate permissions schema
      run: |
        echo "Validating supanova/policies/permissions.json..."
        npx ajv validate -s scripts/schemas/permissions.json -d supanova/policies/permissions.json
    
    - name: Validate context schema
      run: |
        echo "Validating supanova/context/schema.json..."
        npx ajv validate -s scripts/schemas/context-event.json -d supanova/context/schema.json
